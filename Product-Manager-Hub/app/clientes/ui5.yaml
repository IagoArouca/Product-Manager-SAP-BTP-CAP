specVersion: "3.1"
metadata:
  name: comdouradoclientes
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false # Mantenha false para segurança
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          - path: /cp-products-backend-dest # O prefixo que definimos no manifest.json
            url: http://localhost:4004     # Onde o seu CAP (cds watch) roda localmente
            destination: cp-products-backend-dest # O nome do destino no mta.yaml
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
builder:
  customTasks: []