_schema-version: "3.3"
ID: cp_products_enterprise
version: 1.1.9

parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --legacy-peer-deps
        - npx cds build --production

modules:

  - name: cp-products-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 512M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: cp-products-auth
      - name: cp-products-db

  - name: cp-products-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cp-products-db

  - name: cp-products-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: cp-products-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: ui_clientes
          artifacts: [comdouradoclientes.zip]
          target-path: resources/
        - name: ui_orders
          artifacts: [comdouradoorders.zip]
          target-path: resources/
        - name: ui_products
          artifacts: [comdouradoproducts.zip]
          target-path: resources/

  - name: cp-products-destination-content
    type: com.sap.application.content
    path: . 
    build-parameters:
      no-source: true
    requires:
      - name: cp-products-dest-service
        parameters:
          content-target: true
      - name: cp-products-repo-runtime
      - name: cp-products-auth
      - name: srv-api
    parameters:
      content:
        subaccount:
          existing_destinations_policy: update
          destinations:
            - Name: cp-products-backend-dest
              URL: ~{srv-api/srv-url}
              Authentication: OAuth2UserTokenExchange
              HTML5.DynamicDestination: true
              HTML5.ForwardAuthToken: true
              ServiceInstanceName: cp-products-auth


            - Name: cp_products_v3_repo_runtime
              ServiceInstanceName: cp-products-repo-runtime
              ServiceKeyName: cp-products-destination-content-cp-products-repo-runtime-credentials
              Authentication: OAuth2UserTokenExchange
              sap.cloud.service: cp.products.v3

  - name: ui_clientes
    type: html5
    path: app/clientes
    build-parameters: 
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
        - cp xs-app.json dist/
        - bash -c "cd dist && zip -r ../comdouradoclientes.zip ."
      build-result: .
      
      

  - name: ui_orders
    type: html5
    path: app/orders_app
    build-parameters:
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
        - cp xs-app.json dist/
        - bash -c "cd dist && zip -r ../comdouradoorders.zip ."
      build-result: .

  - name: ui_products
    type: html5
    path: app/products_app
    build-parameters: 
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
        - cp xs-app.json dist/
        - bash -c "cd dist && zip -r ../comdouradoproducts.zip ."
      build-result: .

resources:
  - name: cp-products-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cp_products_v3
        tenant-mode: dedicated

  - name: cp-products-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: cp-products-dest-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true

  - name: cp-products-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: cp-products-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
