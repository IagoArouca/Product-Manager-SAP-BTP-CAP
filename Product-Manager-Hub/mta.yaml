_schema-version: 3.3.0
ID: cp-products-management
version: 1.0.0
description: "Enterprise Product Management System"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # --------------------- MÓDULO DO SERVIÇO (BACKEND) ---------------------
  - name: cp-products-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: cp-products-management-auth
      - name: cp-products-management-db

  # --------------------- MÓDULO DE DEPLOY DO BANCO (HANA) ----------------
  - name: cp-products-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cp-products-management-db

resources:
  # --------------------- RECURSO: AUTENTICAÇÃO (XSUAA) -------------------
  - name: cp-products-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: cp-products-management-${org}-${space}
        tenant-mode: dedicated
        role-collections:
          - name: 'Admin_Product_Manager_${space}'
            description: 'Administrador do sistema de produtos'
            role-template-references:
              - '$XSAPPNAME.admin'

  # --------------------- RECURSO: BANCO DE DADOS (HANA) ------------------
  - name: cp-products-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared