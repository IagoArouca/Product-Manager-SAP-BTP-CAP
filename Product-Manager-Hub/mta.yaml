_schema-version: "3.3"
ID: cp_products_enterprise
version: 1.0.6
parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --legacy-peer-deps
        - npx cds build --production

modules:
  # ------------------------------------------------------------
  # BACKEND - OData Service
  # ------------------------------------------------------------
  - name: cp-products-srv
    type: nodejs
    path: gen/srv
    parameters:
      memory: 512M
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: cp-products-auth
      - name: cp-products-db

  # ------------------------------------------------------------
  # DB DEPLOYER - HANA Tables
  # ------------------------------------------------------------
  - name: cp-products-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: cp-products-db

  # ------------------------------------------------------------
  # UI CONTENT - Sobe os ZIPs para o HTML5 Repo
  # ------------------------------------------------------------
  - name: cp-products-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: cp-products-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: ui_clientes
          artifacts: [comdouradoclientes.zip]
          target-path: resources/
        - name: ui_orders
          artifacts: [comdouradoorders.zip]
          target-path: resources/
        - name: ui_products
          artifacts: [comdouradoproducts.zip]
          target-path: resources/

  # ------------------------------------------------------------
  # BUILDERS - Apenas compilam os apps (Não criam instâncias)
  # ------------------------------------------------------------
  - name: ui_clientes
    type: com.sap.application.content
    path: app/clientes
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
        - cp xs-app.json dist/
        - bash -c "cd dist && zip -r ../comdouradoclientes.zip ."
      build-result: .

  - name: ui_orders
    type: com.sap.application.content
    path: app/orders_app
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
        - cp xs-app.json dist/
        - bash -c "cd dist && zip -r ../comdouradoorders.zip ."
      build-result: .

  - name: ui_products
    type: com.sap.application.content
    path: app/products_app
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest dist
        - cp xs-app.json dist/
        - bash -c "cd dist && zip -r ../comdouradoproducts.zip ."
      build-result: .

# ------------------------------------------------------------
# RESOURCES - Serviços instanciados no BTP
# ------------------------------------------------------------
resources:
  - name: cp-products-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: cp-products-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # Criamos o serviço, mas o conteúdo você fará no Cockpit
  - name: cp-products-dest-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: cp-products-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: cp-products-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime